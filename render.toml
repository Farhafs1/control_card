# ==========================================
# Render Service Environment Configurations
# ==========================================

[[services]]
type = "web"
name = "budget-control-card"
env = "php"

[services.envVars]
  PHP_UPLOAD_MAX_FILESIZE = "64M"
  PHP_POST_MAX_SIZE = "64M"
  PHP_MEMORY_LIMIT = "512M"
  PHP_MAX_EXECUTION_TIME = "300"